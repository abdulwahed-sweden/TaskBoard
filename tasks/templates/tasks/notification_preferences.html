{% extends "base.html" %}
{% block title %}Notification preferences — TaskBoard{% endblock %}
{% block page_title %}Notification preferences{% endblock %}
{% block content %}

<div class="card card-body" style="max-width:560px">
  <p class="text-muted">Choose which task events email you (as the assignee).</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_div }}
    <div class="d-flex gap-2 mt-2">
      <input type="submit" value="Save preferences" class="btn btn-primary">
      <a class="btn btn-outline-secondary" href="{% url 'profile' %}">Back to profile</a>
    </div>
  </form>
</div>

{% endblock %}
