{% extends "base.html" %}
{% block title %}{% if form.instance.pk %}Edit task{% else %}New task{% endif %} — TaskBoard{% endblock %}
{% block content %}

<h1 class="page-title">{% if form.instance.pk %}Edit task{% else %}New task{% endif %}</h1>

<form method="post">
  {% csrf_token %}
  {{ form.as_div }}
  <div class="btn-row">
    <input type="submit" value="Save" class="btn btn-primary">
    <a class="btn btn-secondary" href="{% url 'tasks:Task_list' %}">Cancel</a>
  </div>
</form>

{% endblock %}
