{% extends "base.html" %}
{% block title %}New project — TaskBoard{% endblock %}
{% block content %}

<h1 class="page-title">New project in {{ active_organization }}</h1>

<form method="post">
  {% csrf_token %}
  {{ form.as_div }}
  <div class="btn-row">
    <input type="submit" value="Save" class="btn btn-primary">
    <a class="btn btn-secondary" href="{% url 'organizations:Project_list' %}">Cancel</a>
  </div>
</form>

{% endblock %}
