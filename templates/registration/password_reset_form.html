{% extends "base.html" %}
{% block content %}

<h4>Reset your password</h4>
<p>Enter your account email and we'll send a link to set a new password.</p>

<form method="post">
  {% csrf_token %}
  {{ form.errors }}
  {{ form.as_div }}
  <input type="submit" value="Send reset link" class="btn btn-primary">
</form>

<p class="mt-3"><a href="{% url 'login' %}">Back to log in</a></p>

{% endblock %}
