{% extends "base.html" %}
{% block title %}Reset password — TaskBoard{% endblock %}
{% block content %}

<h1 class="page-title">Reset your password</h1>
<p class="muted">Enter your account email and we'll send a link to set a new password.</p>

<form method="post">
  {% csrf_token %}
  {{ form.non_field_errors }}
  {{ form.as_div }}
  <div class="btn-row">
    <input type="submit" value="Send reset link" class="btn btn-primary">
    <a class="btn btn-secondary" href="{% url 'login' %}">Back to log in</a>
  </div>
</form>

{% endblock %}
