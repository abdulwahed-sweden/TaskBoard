{% extends "base.html" %}
{% block content %}

<h4>Log in</h4>

<form method="post">
  {% csrf_token %}
  {{ form.errors }}
  {{ form.as_div }}
  <input type="submit" value="Log in" class="btn btn-primary">
</form>

<p class="mt-3">
  <a href="{% url 'password_reset' %}">Forgot your password?</a>
</p>
<p>
  No account? <a href="{% url 'signup' %}">Sign up</a>.
</p>

{% endblock %}
