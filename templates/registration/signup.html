{% extends "base.html" %}
{% block title %}Sign up — TaskBoard{% endblock %}
{% block page_title %}Sign up{% endblock %}
{% block content %}

<div class="card card-body" style="max-width:420px">
  <form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {{ form.as_div }}
    <button type="submit" class="btn btn-primary w-100">Sign up</button>
  </form>
  <hr>
  <p class="small text-muted mb-0">Already have an account? <a href="{% url 'login' %}">Log in</a>.</p>
</div>

{% endblock %}
