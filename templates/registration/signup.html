{% extends "base.html" %}
{% block content %}

<h4>Sign up</h4>

<form method="post">
  {% csrf_token %}
  {{ form.errors }}
  {{ form.as_div }}
  <input type="submit" value="Sign up" class="btn btn-primary">
</form>

<p class="mt-3">
  Already have an account? <a href="{% url 'login' %}">Log in</a>.
</p>

{% endblock %}
